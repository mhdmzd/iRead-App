name: Android CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Extract Project Files
      run: |
        if [ -f iRead.tar ]; then
          echo "Extracting iRead.tar..."
          tar -xvf iRead.tar
          # نمایش لیست فایل‌ها برای اطمینان از استخراج صحیح
          ls -la
        else
          echo "iRead.tar not found in root, checking current files..."
          ls -la
        fi

    - name: Locate Project and Grant Permissions
      run: |
        # پیدا کردن مسیر واقعی فایل gradlew در صورت وجود پوشه‌های فرعی
        GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
        if [ -n "$GRADLEW_PATH" ]; then
          echo "Found gradlew at: $GRADLEW_PATH"
          chmod +x "$GRADLEW_PATH"
          # ذخیره مسیر برای مرحله بعد
          echo "GRADLEW_DIR=$(dirname "$GRADLEW_PATH")" >> $GITHUB_ENV
        else
          echo "Error: gradlew file could not be found anywhere!" && exit 1
        fi

    - name: Build Android APK
      run: |
        cd ${{ env.GRADLEW_DIR }}
        echo "Starting build in $(pwd)..."
        ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: iread-final-apk
        path: '**/build/outputs/apk/debug/*.apk'
        
