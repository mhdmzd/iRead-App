name: Android CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Force Generate Android Structure and Inject Code
      run: |
        echo "Creating a bulletproof Android environment..."
        # پاکسازی تداخلات
        rm -rf gradle .gradle app build build.gradle settings.gradle gradlew gradlew.bat
        
        # ۱. ساخت فایل تنظیمات پروژه
        echo "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }" > settings.gradle
        echo "dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }" >> settings.gradle
        echo "rootProject.name = 'iReadApp'" >> settings.gradle
        echo "include ':app'" >> settings.gradle

        # ۲. ساخت فایل build.gradle اصلی پروژه
        cat << 'EOF' > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        EOF

        # ۳. ساخت پوشه‌های استاندارد اپلیکیشن اندروید
        mkdir -p app/src/main/java/com/example/iread
        mkdir -p app/src/main/res/values

        # ۴. ساخت فایل build.gradle مخصوص بخش app
        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.example.iread'
            compileSdk 34
            defaultConfig {
                applicationId "com.example.iread"
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }
        EOF

        # ۵. ساخت مانیفست پایه اندروید
        cat << 'EOF' > app/src/main/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application android:label="iRead" android:theme="@android:style/Theme.Material.NoActionBar">
            </application>
        </manifest>
        EOF

        # ۶. استخراج فایل‌های شما و انتقال کدهای متنی به پروژه
        if [ -f iRead.tar ]; then
          mkdir -p temp_extract
          tar -xvf iRead.tar -C temp_extract/
          echo "Injecting assets..."
          # انتقال فایل‌های استخراج شده به عنوان دارایی‌های برنامه (Assets)
          mkdir -p app/src/main/assets
          cp -r temp_extract/* app/src/main/assets/ || true
        fi

    - name: Initialize Fresh Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    - name: Build Android Debug APK
      run: |
        ./gradlew :app:assembleDebug --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: iread-success-apk
        path: 'app/build/outputs/apk/debug/*.apk'
        
