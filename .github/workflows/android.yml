name: Android CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Clean Environment and Extract Project
      run: |
        echo "Cleaning up loose files to prevent conflicts..."
        # حذف فایل‌های ناقص بیرونی برای جلوگیری از تداخل
        rm -f gradlew gradlew.bat settings.gradle build.gradle
        rm -rf gradle app
        
        echo "Extracting clean project from iRead.tar..."
        tar -xvf iRead.tar
        
        # پیدا کردن پوشه‌ای که کدهای اصلی بعد از استخراج در آن قرار گرفته‌اند
        PROJECT_DIR=$(find . -maxdepth 2 -name "settings.gradle" -o -name "settings.gradle.kts" | head -n 1)
        if [ -n "$PROJECT_DIR" ]; then
          REAL_ROOT=$(dirname "$PROJECT_DIR")
          echo "PROJECT_ROOT=$REAL_ROOT" >> $GITHUB_ENV
          echo "Project located at: $REAL_ROOT"
        else
          echo "Warning: settings.gradle not found, using workspace root."
          echo "PROJECT_ROOT=$GITHUB_WORKSPACE" >> $GITHUB_ENV
        fi

    - name: Initialize Fresh Gradle Wrapper
      run: |
        cd ${{ env.PROJECT_ROOT }}
        echo "Generating a fresh, uncorrupted Gradle wrapper..."
        gradle wrapper --gradle-version 8.4
        chmod +x gradlew

    - name: Build Android APK
      run: |
        cd ${{ env.PROJECT_ROOT }}
        echo "Building APK..."
        ./gradlew assembleDebug --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: iread-final-apk
        path: '**/build/outputs/apk/debug/*.apk'
        
