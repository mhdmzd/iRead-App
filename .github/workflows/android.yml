name: Android CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create Isolated Sandbox & Project Structure
      run: |
        # ۱. پاکسازی همه‌جانبه برای جلوگیری از هرگونه تداخل فایل‌های قبلی
        rm -rf app gradle .gradle build build.gradle settings.gradle gradlew gradlew.bat
        
        # ۲. ساختار دایرکتوری‌های استاندارد ماژول اصلی
        mkdir -p app/src/main/java/com/example/iread
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/assets

        # ۳. ساخت فایل تنظیمات پروژه
        echo "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }" > settings.gradle
        echo "dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }" >> settings.gradle
        echo "rootProject.name = 'iReadApp'" >> settings.gradle
        echo "include ':app'" >> settings.gradle

        # ۴. فایل گریدل روت
        cat << 'EOF' > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        EOF

        # ۵. فایل گریدل اپلیکیشن
        cat << 'EOF' > app/build.gradle
        plugins { id 'com.android.application' }
        android {
            namespace 'com.example.iread'
            compileSdk 34
            defaultConfig {
                applicationId "com.example.iread"
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }
        EOF

        # ۶. مانیفست اندروید با دسترسی اینترنت
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <application android:label="iRead" android:theme="@android:style/Theme.Material.NoActionBar" android:usesCleartextTraffic="true">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # ۷. کدهای اکتیویتی اصلی (WebView Launcher)
        cat << 'EOF' > app/src/main/java/com/example/iread/MainActivity.java
        package com.example.iread;
        import android/app/Activity;
        import android/os/Bundle;
        import android/webkit/WebView;
        import android/webkit/WebViewClient;
        public class MainActivity extends Activity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                WebView webView = new WebView(this);
                webView.getSettings().setJavaScriptEnabled(true);
                webView.getSettings().setDomStorageEnabled(true);
                webView.setWebViewClient(new WebViewClient());
                setContentView(webView);
                webView.loadUrl("file:///android_asset/index.html");
            }
        }
        EOF

        # ۸. ساخت فایل استایل‌های ضروری
        echo '<resources><string name="app_name">iRead</string></resources>' > app/src/main/res/values/strings.xml

        # ۹. استخراج محتوای فایل شما مستقیم به وب‌ویو اپلیکیشن
        if [ -f iRead.tar ]; then
          tar -xvf iRead.tar -C app/src/main/assets/ || true
          # اطمینان از اینکه اگر کدهای شما داخل ساب‌فولدر بود، فایل اصلی پیدا شود
          cd app/src/main/assets/
          if [ -d iRead ]; then
            mv iRead/* . && rm -rf iRead
          fi
          # ساخت یک فایل کمکی در صورت نبود فایل اصلی
          if [ ! -f index.html ]; then
            echo "<h1>iRead App Launched</h1>" > index.html
          fi
          cd ../../../..
        fi

    - name: Build Android Clean APK
      run: |
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew
        ./gradlew :app:assembleDebug --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: iread-final-build
        path: 'app/build/outputs/apk/debug/*.apk'
        
