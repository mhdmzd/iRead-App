name: Build Fixed SMS Bot APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Generate Clean Android Project
      run: |
        rm -rf app gradle .gradle build build.gradle settings.gradle gradlew gradlew.bat
        
        mkdir -p app/src/main/java/com/example/smsbot
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values

        echo "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }" > settings.gradle
        echo "dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }" >> settings.gradle
        echo "rootProject.name = 'SmsTelegramBot'" >> settings.gradle
        echo "include ':app'" >> settings.gradle

        cat << 'EOF' > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        EOF

        cat << 'EOF' > app/build.gradle
        plugins { id 'com.android.application' }
        android {
            namespace 'com.example.smsbot'
            compileSdk 34
            defaultConfig {
                applicationId "com.example.smsbot"
                minSdk 24
                targetSdk 34
                versionCode 8
                versionName "8.0"
            }
        }
        EOF

        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.RECEIVE_SMS" />
            <uses-permission android:name="android.permission.READ_SMS" />
            <uses-permission android:name="android.permission.INTERNET" />
            <application android:label="SmsBot" android:theme="@android:style/Theme.DeviceDefault.Lollipop">
                <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="portrait">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
                <receiver android:name=".SmsReceiver" android:permission="android.permission.BROADCAST_SMS" android:exported="true">
                    <intent-filter android:priority="999">
                        <action android:name="android.provider.Telephony.SMS_RECEIVED" />
                    </intent-filter>
                </receiver>
            </application>
        </manifest>
        EOF

        cat << 'EOF' > app/src/main/res/layout/activity_main.xml
        <ScrollView xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:fillViewport="true">
            <LinearLayout android:orientation="vertical" android:layout_width="match_parent" android:layout_height="wrap_content" android:padding="24dp">
                <TextView android:text="تنظیمات ربات هوشمند پیامک" android:textSize="20sp" android:textStyle="bold" android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_gravity="right" android:layout_marginBottom="32dp"/>
                <TextView android:text="Telegram Bot Token:" android:textSize="14sp" android:textStyle="bold" android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_gravity="right" android:layout_marginBottom="6dp"/>
                <EditText android:id="@+id/etToken" android:hint="Token" android:textSize="15sp" android:padding="12dp" android:layout_width="match_parent" android:layout_height="wrap_content" android:layout_marginBottom="20dp"/>
                <TextView android:text="Telegram Chat ID:" android:textSize="14sp" android:textStyle="bold" android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_gravity="right" android:layout_marginBottom="6dp"/>
                <EditText android:id="@+id/etChatId" android:hint="Chat ID" android:textSize="15sp" android:padding="12dp" android:layout_width="match_parent" android:layout_height="wrap_content" android:layout_marginBottom="20dp"/>
                <TextView android:text="سرشماره‌های بانکی (جداکننده با کاما):" android:textSize="14sp" android:textStyle="bold" android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_gravity="right" android:layout_marginBottom="6dp"/>
                <EditText android:id="@+id/etSenders" android:hint="Mellat, Tejarat, 982000" android:textSize="15sp" android:padding="12dp" android:layout_width="match_parent" android:layout_height="wrap_content" android:layout_marginBottom="32dp"/>
                <Button android:id="@+id/btnSave" android:text="ذخیره تنظیمات" android:textSize="16sp" android:textStyle="bold" android:padding="14dp" android:layout_width="match_parent" android:layout_height="wrap_content"/>
                <TextView android:id="@+id/tvStatus" android:text="وضعیت: آماده به کار (بهینه باتری)" android:textSize="14sp" android:layout_marginTop="24dp" android:layout_gravity="center" android:layout_width="wrap_content" android:layout_height="wrap_content"/>
            </LinearLayout>
        </ScrollView>
        EOF

        cat << 'EOF' > app/src/main/java/com/example/smsbot/MainActivity.java
        package com.example.smsbot;
        import android.app.Activity;
        import android.content.SharedPreferences;
        import android.os.Bundle;
        import android.view.View;
        import android.widget.Button;
        import android.widget.EditText;
        import android.widget.Toast;
        import android.Manifest;

        public class MainActivity extends Activity {
            private EditText etToken, etChatId, etSenders;
            private SharedPreferences prefs;

            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(getResources().getIdentifier("activity_main", "layout", getPackageName()));

                prefs = getSharedPreferences("SmsBotPrefs", MODE_PRIVATE);
                etToken = findViewById(getResources().getIdentifier("etToken", "id", getPackageName()));
                etChatId = findViewById(getResources().getIdentifier("etChatId", "id", getPackageName()));
                etSenders = findViewById(getResources().getIdentifier("etSenders", "id", getPackageName()));
                Button btnSave = findViewById(getResources().getIdentifier("btnSave", "id", getPackageName()));

                etToken.setText(prefs.getString("token", ""));
                etChatId.setText(prefs.getString("chatId", ""));
                etSenders.setText(prefs.getString("senders", ""));

                if (checkSelfPermission(Manifest.permission.RECEIVE_SMS) != 0) {
                    requestPermissions(new String[]{Manifest.permission.RECEIVE_SMS, Manifest.permission.READ_SMS}, 101);
                }

                btnSave.setOnClickListener(new View.OnClickListener() {
                    @Override
                    public void onClick(View v) {
                        prefs.edit()
                            .putString("token", etToken.getText().toString().trim())
                            .putString("chatId", etChatId.getText().toString().trim())
                            .putString("senders", etSenders.getText().toString().trim())
                            .apply();
                        Toast.makeText(MainActivity.this, "ذخیره شد", Toast.LENGTH_SHORT).show();
                    }
                });
            }
        }
        EOF

        cat << 'EOF' > app/src/main/java/com/example/smsbot/SmsReceiver.java
        package com.example.smsbot;
        import android.content.BroadcastReceiver;
        import android.content.Context;
        import android.content.Intent;
        import android.content.SharedPreferences;
        import android.os.Bundle;
        import android.telephony.SmsMessage;
        import java.net.HttpURLConnection;
        import java.net.URL;

        public class SmsReceiver extends BroadcastReceiver {
            @Override
            public void onReceive(Context context, Intent intent) {
                if (intent == null || intent.getExtras() == null) return;
                
                SharedPreferences prefs = context.getSharedPreferences("SmsBotPrefs", Context.MODE_PRIVATE);
                final String token = prefs.getString("token", "");
                final String chatId = prefs.getString("chatId", "");
                String allowedSenders = prefs.getString("senders", "");

                if (token.isEmpty() || chatId.isEmpty()) return;

                Object[] pdus = (Object[]) intent.getExtras().get("pdus");
                if (pdus != null) {
                    for (Object pdu : pdus) {
                        SmsMessage sms = SmsMessage.createFromPdu((byte[]) pdu);
                        String sender = sms.getOriginatingAddress();
                        String body = sms.getMessageBody();

                        if (sender == null || body == null) continue;

                        boolean isAllowed = false;
                        if (!allowedSenders.isEmpty()) {
                            String[] sendersArray = allowedSenders.split(",");
                            for (String s : sendersArray) {
                                if (sender.toLowerCase().contains(s.trim().toLowerCase())) {
                                    isAllowed = true;
                                    break;
                                }
                            }
                        }

                        if (isAllowed && (body.contains("واریز") || body.contains("موفق") || body.contains("مانده"))) {
                            sendToTelegramAndDie(token, chatId, "فرستنده: " + sender + "\n\n" + body);
                        }
                    }
                }
            }

            private void sendToTelegramAndDie(final String token, final String chatId, final String text) {
                new Thread(new Runnable() {
                    @Override
                    public void run() {
                        HttpURLConnection conn = null;
                        try {
                            String urlString = "https://api.telegram.org/bot" + token + "/sendMessage?chat_id=" + chatId + "&text=" + java.net.URLEncoder.encode(text, "UTF-8");
                            URL url = new URL(urlString);
                            conn = (HttpURLConnection) url.openConnection();
                            conn.setRequestMethod("GET");
                            conn.setConnectTimeout(4000);
                            conn.setReadTimeout(4000);
                            conn.getInputStream().read();
                        } catch (Exception e) {
                            e.printStackTrace();
                        } finally {
                            if (conn != null) conn.disconnect();
                        }
                    }
                }).start();
            }
        }
        EOF

        echo '<resources><string name="app_name">SmsBot</string></resources>' > app/src/main/res/values/strings.xml

    - name: Build Clean Android Production APK
      run: |
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew
        ./gradlew :app:assembleDebug --no-daemon

    - name: Upload Clean APK
      uses: actions/upload-artifact@v4
      with:
        name: SMS-Stable-Bot
        path: 'app/build/outputs/apk/debug/*.apk'
        
